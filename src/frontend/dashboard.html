<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Payroll Management System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }
    .header {
      background: #1F4E79;
      color: white;
      padding: 16px 32px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .header span { color: #90CAF9; font-size: 14px; display: block; }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }

    .card h2 {
      color: #1F4E79;
      margin-bottom: 24px;
      font-size: 20px;
      border-bottom: 2px solid #90CAF9;
      padding-bottom: 10px;
    }

    label {
      display: block;
      color: #555;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #1F4E79; }

    button {
      width: 100%;
      padding: 13px;
      background: #1F4E79;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2E75B6; }

    .error {
      color: #c0392b;
      background: #fdecea;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .hidden { display: none; }

    /* Payslip Styles */
    .payslip-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .payslip-header h3 {
      color: #1F4E79;
      font-size: 22px;
    }
    .payslip-header p {
      color: #777;
      font-size: 13px;
    }

    .emp-info {
      background: #EBF3FB;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .emp-info div { font-size: 14px; color: #333; }
    .emp-info div span { font-weight: bold; color: #1F4E79; }

    .salary-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }
    .salary-table th {
      background: #1F4E79;
      color: white;
      padding: 10px 14px;
      text-align: left;
      font-size: 14px;
    }
    .salary-table td {
      padding: 10px 14px;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    .salary-table tr:nth-child(even) td { background: #f5f9ff; }
    .salary-table .amount { text-align: right; font-weight: bold; }

    .net-salary {
      background: #1F4E79;
      color: white;
      padding: 16px 20px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
    }

    .btn-secondary {
      background: #2E75B6;
      margin-top: 16px;
    }
    .btn-print {
      background: #27ae60;
      margin-top: 10px;
    }
    .btn-print:hover { background: #219a52; }

    @media print {
      .header, button, .no-print { display: none; }
      body { background: white; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="header">
  🏢 Employee Payroll Management System
  <span>VIT — SCM Case Study v2.0</span>
</div>

<div class="container">

  <!-- LOGIN SECTION -->
  <div class="card" id="loginSection">
    <h2>🔐 Employee Login</h2>
    <div class="error hidden" id="loginError"></div>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    <button onclick="handleLogin()">Login</button>
    <p style="margin-top:14px; font-size:12px; color:#999; text-align:center;">
      Demo: username = <b>admin</b> | password = <b>admin123</b>
    </p>
  </div>

  <!-- EMP ID SECTION -->
  <div class="card hidden" id="empSection">
    <h2>🔍 Search Employee</h2>
    <div class="error hidden" id="empError"></div>
    <label>Employee ID</label>
    <input type="text" id="empId" placeholder="e.g. EMP001, EMP002 ... EMP005"
           onkeydown="if(event.key==='Enter') fetchPayslip()" />
    <button onclick="fetchPayslip()">Get Payslip</button>
    <p style="margin-top:14px; font-size:12px; color:#999; text-align:center;">
      Available IDs: EMP001, EMP002, EMP003, EMP004, EMP005
    </p>
    <button class="btn-secondary" onclick="logout()" style="margin-top:10px;">
      Logout
    </button>
  </div>

  <!-- PAYSLIP SECTION -->
  <div class="card hidden" id="payslipSection">
    <div class="payslip-header">
      <h3>🧾 Employee Payslip</h3>
      <p id="payslipMonth"></p>
    </div>

    <div class="emp-info" id="empInfo"></div>

    <table class="salary-table">
      <thead>
        <tr>
          <th>💰 Earnings</th>
          <th class="amount">Amount (₹)</th>
        </tr>
      </thead>
      <tbody id="earningsBody"></tbody>
    </table>

    <table class="salary-table">
      <thead>
        <tr>
          <th>💸 Deductions</th>
          <th class="amount">Amount (₹)</th>
        </tr>
      </thead>
      <tbody id="deductionsBody"></tbody>
    </table>

    <div class="net-salary">
      <span>Net Salary</span>
      <span id="netSalary"></span>
    </div>

    <button class="btn-print" onclick="window.print()">🖨️ Print Payslip</button>
    <button class="btn-secondary" onclick="searchAgain()">🔍 Search Another Employee</button>
  </div>

</div>

<script>
  const fmt = (n) => '₹' + Number(n).toLocaleString('en-IN');
  const now = new Date();
  const months = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];

  function handleLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const err = document.getElementById('loginError');

    const USERS = { admin: 'admin123', hr: 'hr@2026' };

    if (!u || !p) {
      err.textContent = 'Please enter username and password.';
      err.classList.remove('hidden');
      return;
    }

    if (USERS[u] && USERS[u] === p) {
      err.classList.add('hidden');
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('empSection').classList.remove('hidden');
    } else {
      err.textContent = 'Invalid username or password. Please try again.';
      err.classList.remove('hidden');
    }
  }

  function logout() {
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('empSection').classList.add('hidden');
    document.getElementById('payslipSection').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }

  // Salary & Employee Data
  const SALARY = {
    IT:         {"0-2": 35000, "2-5": 55000, "5+": 85000},
    HR:         {"0-2": 25000, "2-5": 40000, "5+": 60000},
    Finance:    {"0-2": 30000, "2-5": 50000, "5+": 75000},
    Operations: {"0-2": 20000, "2-5": 35000, "5+": 55000},
  };

  const EMPLOYEES = {
    EMP001: { name: "Ganesh R",   department: "IT",         experience: 3 },
    EMP002: { name: "Priya S",    department: "HR",         experience: 6 },
    EMP003: { name: "Arjun M",    department: "Finance",    experience: 1 },
    EMP004: { name: "Deepa K",    department: "Operations", experience: 4 },
    EMP005: { name: "Vikram T",   department: "IT",         experience: 7 },
  };

  function getSlab(exp) {
    return exp < 2 ? "0-2" : exp < 5 ? "2-5" : "5+";
  }

  function fetchPayslip() {
    const empId = document.getElementById('empId').value.trim().toUpperCase();
    const err = document.getElementById('empError');

    if (!empId) {
      err.textContent = 'Please enter an Employee ID.';
      err.classList.remove('hidden');
      return;
    }

    const emp = EMPLOYEES[empId];
    if (!emp) {
      err.textContent = `Employee "${empId}" not found. Try EMP001 to EMP005.`;
      err.classList.remove('hidden');
      return;
    }

    err.classList.add('hidden');

    const slab  = getSlab(emp.experience);
    const basic = SALARY[emp.department][slab];

    // Allowances
    const hra     = Math.round(basic * 0.40);
    const da      = Math.round(basic * 0.10);
    const medical = 1500;
    const travel  = 1000;
    const totalAllowances = hra + da + medical + travel;
    const gross = basic + totalAllowances;

    // Deductions
    const pf  = Math.round(basic * 0.12);
    const esi = gross < 21000 ? Math.round(gross * 0.0075) : 0;
    const pt  = gross > 15000 ? 200 : 0;
    const tds = gross > 50000 ? Math.round(gross * 0.10) : 0;
    const totalDeductions = pf + esi + pt + tds;

    const netSalary = gross - totalDeductions;

    // Render
    document.getElementById('payslipMonth').textContent =
      `Pay Period: ${months[now.getMonth()]} ${now.getFullYear()}`;

    document.getElementById('empInfo').innerHTML = `
      <div>Employee ID: <span>${empId}</span></div>
      <div>Name: <span>${emp.name}</span></div>
      <div>Department: <span>${emp.department}</span></div>
      <div>Experience: <span>${emp.experience} Years (${slab} slab)</span></div>
    `;

    document.getElementById('earningsBody').innerHTML = `
      <tr><td>Basic Salary</td><td class="amount">${fmt(basic)}</td></tr>
      <tr><td>HRA (40% of Basic)</td><td class="amount">${fmt(hra)}</td></tr>
      <tr><td>DA (10% of Basic)</td><td class="amount">${fmt(da)}</td></tr>
      <tr><td>Medical Allowance</td><td class="amount">${fmt(medical)}</td></tr>
      <tr><td>Travel Allowance</td><td class="amount">${fmt(travel)}</td></tr>
      <tr style="font-weight:bold; background:#EBF3FB;">
        <td>Gross Salary</td><td class="amount">${fmt(gross)}</td>
      </tr>
    `;

    document.getElementById('deductionsBody').innerHTML = `
      <tr><td>PF (12% of Basic)</td><td class="amount">${fmt(pf)}</td></tr>
      <tr><td>ESI ${gross >= 21000 ? '(Not Applicable)' : '(0.75% of Gross)'}</td>
          <td class="amount">${fmt(esi)}</td></tr>
      <tr><td>Professional Tax ${gross <= 15000 ? '(Not Applicable)' : ''}</td>
          <td class="amount">${fmt(pt)}</td></tr>
      <tr><td>TDS ${gross <= 50000 ? '(Not Applicable)' : '(10% of Gross)'}</td>
          <td class="amount">${fmt(tds)}</td></tr>
      <tr style="font-weight:bold; background:#fdecea;">
        <td>Total Deductions</td><td class="amount">${fmt(totalDeductions)}</td>
      </tr>
    `;

    document.getElementById('netSalary').textContent = fmt(netSalary);

    document.getElementById('empSection').classList.add('hidden');
    document.getElementById('payslipSection').classList.remove('hidden');
  }

  function searchAgain() {
    document.getElementById('payslipSection').classList.add('hidden');
    document.getElementById('empSection').classList.remove('hidden');
    document.getElementById('empId').value = '';
  }
</script>
</body>
</html>
